name: ci

on:
  pull_request:
  push:
    branches:
      - main

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  pull-requests: write
  checks: write

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Check all
        run: bun run lint

      - name: Build
        run: bun run build

      - name: Install Cypress binary
        run: bun x cypress install

      - name: E2E Test
        run: |
          bun x vite preview --host 127.0.0.1 --port 3000 >/tmp/gitignore-in-website-vite.log 2>&1 &
          vite_pid=$!
          trap 'kill $vite_pid 2>/dev/null; wait $vite_pid 2>/dev/null || true; cat /tmp/gitignore-in-website-vite.log' EXIT

          bun x wait-on http://127.0.0.1:3000 --timeout 60000
          bun run test

  octocov:
    runs-on: ubuntu-latest
    needs: [test]
    env:
      CYPRESS_COVERAGE: "true"
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
        with:
          bun-version: 1.3.14

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build

      - name: Install Cypress binary
        run: bun x cypress install

      - name: Test with coverage
        run: |
          bun x vite preview --host 127.0.0.1 --port 3000 >/tmp/gitignore-in-website-vite.log 2>&1 &
          vite_pid=$!
          trap 'kill $vite_pid 2>/dev/null; wait $vite_pid 2>/dev/null || true; cat /tmp/gitignore-in-website-vite.log' EXIT

          bun x wait-on http://127.0.0.1:3000 --timeout 60000
          bun run test:coverage

      - name: Show vite server logs
        if: failure()
        run: cat /tmp/gitignore-in-website-vite.log

      - name: Build coverage report
        run: bun run coverage:report

      - name: Report coverage with octocov
        uses: k1LoW/octocov-action@b3b6ee60482a667950f87553abf1df63217235d9 # v1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          config: .octocov.yml
